<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>直播数据检测 · 多专场模拟</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1a1a2e;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            padding: 1.2rem;
            transition: 0.2s;
        }
        .metric-card {
            background: #fafbfc;
            border-radius: 14px;
            padding: 0.9rem 1rem;
            text-align: center;
            border: 1px solid #f0f0f5;
            transition: 0.15s;
        }
        .metric-card:hover {
            border-color: #d0d5e0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .tag {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .tag-green {
            background: #ecfdf5;
            color: #059669;
        }
        .tag-yellow {
            background: #fffbe6;
            color: #b45309;
        }
        .tag-red {
            background: #fef2f2;
            color: #dc2626;
        }
        .tag-blue {
            background: #eff6ff;
            color: #2563eb;
        }
        .tag-purple {
            background: #f5f3ff;
            color: #7c3aed;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.25);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
        }
        .btn-outline {
            background: white;
            border: 2px solid #d1d5db;
            border-radius: 12px;
            padding: 0.7rem 1.8rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: #374151;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-outline:hover {
            border-color: #2563eb;
            color: #2563eb;
            background: #f8faff;
        }
        textarea {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 80px;
            transition: 0.2s;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }
        input[type="text"] {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            outline: none;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }
        select {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            outline: none;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }
        select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
        }
        .danmaku-item {
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            font-size: 0.78rem;
            background: #f9fafb;
            display: inline-block;
            margin: 0.15rem;
            border: 1px solid #eee;
        }
        .danmaku-positive {
            background: #ecfdf5;
            color: #059669;
            border-color: #d1fae5;
        }
        .danmaku-question {
            background: #fffbe6;
            color: #b45309;
            border-color: #fef3c7;
        }
        .danmaku-negative {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }
        .highlight-num {
            font-variant-numeric: tabular-nums;
            font-family: 'Inter', 'SF Mono', monospace;
        }
        .scene-btn {
            border: 2px solid #e5e7eb;
            border-radius: 24px;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            background: white;
            color: #6b7280;
            white-space: nowrap;
        }
        .scene-btn:hover {
            border-color: #93c5fd;
            color: #2563eb;
        }
        .scene-btn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
            font-weight: 600;
        }
    </style>
</head>
<body class="p-3 md:p-5 max-w-6xl mx-auto">

    <!-- ==================== 头部 ==================== -->
    <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
        <div>
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-chart-line text-blue-600"></i> 直播数据检测模拟器
            </h1>
            <p class="text-sm text-gray-500 mt-1">
                直播时长 120 分钟 · 数据已脱敏 · 选择不同专场观察数据差异
            </p>
        </div>
        <div class="flex gap-2 items-center flex-wrap">
            <div class="bg-white rounded-full px-4 py-2 shadow-sm border text-sm">
                📅 <span id="currentDate" class="text-gray-600"></span>
            </div>
            <button id="refreshDataBtn" class="btn-outline text-sm">
                <i class="fa-solid fa-rotate-right"></i> 微调数据
            </button>
        </div>
    </div>

    <!-- ==================== 专场选择 ==================== -->
    <div class="card mb-4">
        <div class="flex flex-wrap items-center gap-3">
            <span class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                <i class="fa-solid fa-tags text-blue-500"></i> 直播专场：
            </span>
            <div class="flex flex-wrap gap-2" id="sceneButtons">
                <button class="scene-btn active" data-scene="beauty">💄 美妆个护</button>
                <button class="scene-btn" data-scene="food">🍜 食品饮料</button>
                <button class="scene-btn" data-scene="clothing">👗 服饰鞋包</button>
                <button class="scene-btn" data-scene="home">🏠 家居日用</button>
                <button class="scene-btn" data-scene="digital">📱 数码家电</button>
            </div>
            <span id="sceneTag" class="tag tag-green"><i class="fa-solid fa-check-circle mr-1"></i>美妆个护</span>
        </div>
    </div>

    <!-- ==================== 学生信息 ==================== -->
    <div class="card mb-4">
        <div class="flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[140px]">
                <label class="text-sm font-medium text-gray-600 block mb-1">学生姓名</label>
                <input type="text" id="studentName" placeholder="请输入姓名" class="w-full">
            </div>
            <div class="flex-1 min-w-[140px]">
                <label class="text-sm font-medium text-gray-600 block mb-1">学号</label>
                <input type="text" id="studentId" placeholder="请输入学号" class="w-full">
            </div>
            <div class="flex-1 min-w-[140px]">
                <label class="text-sm font-medium text-gray-600 block mb-1">班级</label>
                <input type="text" id="studentClass" placeholder="如：电商2201" class="w-full">
            </div>
        </div>
    </div>

    <!-- ==================== 核心指标卡片 ==================== -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="metricsCards">
        <!-- JS动态填充 -->
    </div>

    <!-- ==================== 趋势图 ==================== -->
    <div class="card mb-4">
        <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
            <h3 class="font-semibold text-gray-700 text-lg flex items-center gap-2">
                <i class="fa-solid fa-wave-square text-blue-500"></i> 在线人数 & 成交额趋势
                <span class="text-xs text-gray-400 font-normal">(每5分钟采样)</span>
            </h3>
            <div class="flex gap-3 text-xs">
                <span class="flex items-center gap-1"><span class="w-3 h-0.5 bg-blue-500 inline-block rounded"></span> 在线人数</span>
                <span class="flex items-center gap-1"><span class="w-3 h-0.5 bg-amber-500 inline-block rounded" style="border-top:2px dashed #f59e0b;"></span> 成交额</span>
            </div>
        </div>
        <div style="position:relative; height:300px;">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <!-- ==================== 中部：商品销售 + 流量来源 ==================== -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-4 mb-4">
        <!-- 商品销售表格 -->
        <div class="card lg:col-span-3 overflow-x-auto">
            <h3 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-box text-blue-500"></i> 商品销售明细
                <span class="text-xs text-gray-400 font-normal" id="sceneLabelInTable">— 美妆个护</span>
            </h3>
            <table class="w-full text-sm" id="productTable">
                <thead>
                    <tr class="text-left text-gray-500 text-xs border-b">
                        <th class="py-2 pr-2">商品名称</th>
                        <th class="py-2 px-2 text-center">售价</th>
                        <th class="py-2 px-2 text-center">销量</th>
                        <th class="py-2 px-2 text-center">销售额</th>
                        <th class="py-2 px-2 text-center">转化率</th>
                        <th class="py-2 pl-2 text-center">好评率</th>
                    </tr>
                </thead>
                <tbody id="productTableBody"></tbody>
            </table>
        </div>
        <!-- 流量来源 + 弹幕概况 -->
        <div class="lg:col-span-2 space-y-4">
            <div class="card">
                <h3 class="font-semibold text-gray-700 mb-2 flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-share-nodes text-blue-500"></i> 流量来源
                </h3>
                <div style="position:relative; height:180px;">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h3 class="font-semibold text-gray-700 mb-2 flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-comments text-blue-500"></i> 弹幕情绪分布
                </h3>
                <div class="flex gap-3 text-center text-xs" id="danmakuStats">
                    <!-- JS填充 -->
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 弹幕互动样本 ==================== -->
    <div class="card mb-4">
        <h3 class="font-semibold text-gray-700 mb-2 flex items-center gap-2">
            <i class="fa-solid fa-comment-dots text-blue-500"></i> 弹幕互动样本
            <span class="text-xs text-gray-400 font-normal">(从全场2,380条弹幕中抽取)</span>
        </h3>
        <div id="danmakuSamples" class="flex flex-wrap gap-1.5 max-h-32 overflow-y-auto"></div>
    </div>

    <!-- ==================== 学生诊断区 ==================== -->
    <div class="card mb-4" id="diagnosisSection">
        <h3 class="font-semibold text-gray-700 text-lg mb-3 flex items-center gap-2">
            <i class="fa-solid fa-clipboard-list text-blue-600"></i> 直播诊断分析
            <span class="text-xs text-gray-400 font-normal">请根据上方数据回答以下问题</span>
        </h3>
        <div class="space-y-5">
            <div>
                <label class="text-sm font-medium text-gray-700 block mb-1">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs mr-2">1</span>
                    请分析本场直播的<strong>流量趋势</strong>：指出在线人数的峰值出现在什么时段？该时段发生了什么？流量在哪个阶段下降较快？
                </label>
                <textarea id="answer1" placeholder="请在此输入你的分析..."></textarea>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-700 block mb-1">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs mr-2">2</span>
                    对比各商品的<strong>转化率与好评率</strong>，哪款商品表现最需要优化？请分析可能原因并提出改进建议。
                </label>
                <textarea id="answer2" placeholder="请在此输入你的分析..."></textarea>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-700 block mb-1">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs mr-2">3</span>
                    本场直播<strong>退单率</strong>为 <span id="refundRateHint" class="text-red-500 font-bold"></span>，请分析退单的可能原因，并给出降低退单率的运营建议。
                </label>
                <textarea id="answer3" placeholder="请在此输入你的分析..."></textarea>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-700 block mb-1">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs mr-2">4</span>
                    观察<strong>弹幕情绪分布</strong>，负面和质疑类弹幕占比如何？如果是你，会在直播中如何应对这些弹幕？
                </label>
                <textarea id="answer4" placeholder="请在此输入你的分析..."></textarea>
            </div>
            <div>
                <label class="text-sm font-medium text-gray-700 block mb-1">
                    <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs mr-2">5</span>
                    综合以上分析，请为下一场直播提出<strong>3条具体的优化建议</strong>（可涉及选品、话术、节奏、互动等方面）。
                </label>
                <textarea id="answer5" placeholder="请在此输入你的优化建议..."></textarea>
            </div>
        </div>
    </div>

    <!-- ==================== 底部操作按钮 ==================== -->
    <div class="flex flex-wrap gap-3 justify-center md:justify-end items-center">
        <button id="clearAnswersBtn" class="btn-outline text-sm">
            <i class="fa-solid fa-eraser"></i> 清空回答
        </button>
        <button id="exportBtn" class="btn-primary text-lg px-8">
            <i class="fa-solid fa-file-export"></i> 导出诊断报告 (CSV)
        </button>
    </div>

    <!-- 提示信息 -->
    <p class="text-center text-xs text-gray-400 mt-4">
        <i class="fa-regular fa-lightbulb"></i> 切换专场后数据会刷新，已填写的诊断内容会保留 · 导出后请将CSV文件提交给老师
    </p>

                        '主播介绍得很详细', '价格实惠', '正好需要这个', '质量看起来很好',
                        '买了保温杯，期待', '家居好物推荐', '支持主播，关注了',
                    ],
                    danmakuQuestion: [
                        '四件套缩水吗？', '拖把能换头吗？', '香薰能燃多久？', '保温杯保温几小时？',
                        '收纳箱多大尺寸？', '可以机洗吗？', '包邮吗？', '有安装说明吗？',
                        '这个材质安全吗？',
                    ],
                    danmakuNegative: [
                        '上次买的有点味道', '尺寸和描述不符', '快递压坏了', '感觉不太值',
                        '能再便宜点吗？', '发货有点慢',
                    ],
                },
                digital: {
                    name: '数码家电',
                    emoji: '📱',
                    tagClass: 'tag-blue',
                    avgPriceRange: [200, 500],
                    refundRateRange: [3.5, 6.0],
                    products: [
                        { name: '无线降噪耳机', price: 399, conversionBase: 2.2, goodRateBase: 93 },
                        { name: '快充充电宝', price: 149, conversionBase: 5.0, goodRateBase: 95 },
                        { name: '智能运动手表', price: 599, conversionBase: 1.5, goodRateBase: 90 },
                        { name: '桌面加湿器', price: 89, conversionBase: 6.5, goodRateBase: 92 },
                        { name: '护眼LED台灯', price: 179, conversionBase: 3.5, goodRateBase: 94 },
                    ],
                    danmakuPositive: [
                        '耳机音质不错', '充电宝很实用', '主播测试得很仔细', '已下单手表',
                        '这个价格很划算', '参数讲解得很清楚', '对比了其他品牌，这个好',
                        '支持主播！', '加湿器颜值高', '台灯护眼功能不错', '数码控来了',
                    ],
                    danmakuQuestion: [
                        '保修多久？', '支持七天无理由吗？', '耳机续航几小时？', '充电宝能充几次？',
                        '手表防水吗？', '有没有发票？', '功率多大？', '可以用快充吗？',
                        '和XX品牌对比怎么样？', '售后怎么处理？',
                    ],
                    danmakuNegative: [
                        '上次买的耳机有电流声', '充电宝容量虚标', '手表功能没说的那么多',
                        '发货慢', '包装有点简陋', '价格波动大',
                    ],
                },
            };

            let currentScene = 'beauty';
            let currentData = null;

            // ==================== 数据生成 ====================
            function generateData(scene) {
                const config = sceneConfigs[scene];
                const baseOnline = [
                    280, 350, 480, 620, 750, 880, 980, 1050, 1120, 1180, 1150, 1200,
                    1080, 1020, 980, 1050, 1100, 1080, 950, 820, 700, 580, 450, 380
                ];
                const baseRevenue = [
                    1200, 1800, 2400, 3500, 4200, 5500, 6800, 7800, 8500, 9200, 8800, 9800,
                    10500, 12000, 11000, 13500, 15500, 14000, 11800, 9500, 7200, 5200, 3500, 2200
                ];
                const online = baseOnline.map(v => Math.max(100, v + Math.floor((Math.random() - 0.5) * 80)));
                const revenue = baseRevenue.map(v => Math.max(500, v + Math.floor((Math.random() - 0.5) * 1500)));
                const interactionRate = [
                    5.2, 4.8, 4.5, 4.0, 3.8, 3.5, 3.2, 4.8, 5.5, 6.2, 5.8, 5.0,
                    3.8, 3.2, 2.8, 3.0, 3.5, 3.0, 2.5, 2.2, 2.0, 1.8, 2.5, 3.0
                ].map(v => parseFloat((v + (Math.random() - 0.5) * 0.6).toFixed(2)));

                const peakOnline = Math.max(...online);
                const totalViewers = Math.floor(online.reduce((a, b) => a + b, 0) * 0.7 + Math.random() * 500);
                const avgWatchMin = parseFloat((7.5 + (Math.random() - 0.5) * 1.5).toFixed(1));
                const avgInteraction = parseFloat((interactionRate.reduce((a, b) => a + b, 0) / interactionRate.length)
                    .toFixed(2));
                const totalGMV = Math.floor(revenue[revenue.length - 1] * 1.05 + Math.random() * 2000);
                const totalOrders = Math.floor(totalGMV / (config.avgPriceRange[0] + Math.random() * (config.avgPriceRange[
                    1] - config.avgPriceRange[0])));
                const refundRate = parseFloat((config.refundRateRange[0] + Math.random() * (config.refundRateRange[1] -
                    config.refundRateRange[0])).toFixed(1));
                const avgPrice = Math.floor(totalGMV / totalOrders);

                // 按比例分配各商品销量
                const ratios = [0.28, 0.14, 0.32, 0.16, 0.10];
                const productData = config.products.map((p, i) => {
                    const sales = Math.floor(totalOrders * ratios[i]);
                    const conversion = parseFloat((p.conversionBase + (Math.random() - 0.5) * 0.8).toFixed(2));
                    const goodRate = parseFloat((p.goodRateBase + (Math.random() - 0.5) * 4).toFixed(1));
                    return { ...p, sales, conversion, goodRate };
                });

                const trafficSources = [
                    { name: '直播推荐', pct: 35 + Math.floor((Math.random() - 0.5) * 6), color: '#2563eb' },
                    { name: '短视频引流', pct: 25 + Math.floor((Math.random() - 0.5) * 4), color: '#3b82f6' },
                    { name: '搜索', pct: 15 + Math.floor((Math.random() - 0.5) * 4), color: '#60a5fa' },
                    { name: '关注页', pct: 12 + Math.floor((Math.random() - 0.5) * 3), color: '#93c5fd' },
                    { name: '付费流量', pct: 8 + Math.floor((Math.random() - 0.5) * 3), color: '#bfdbfe' },
                    { name: '其他', pct: 5 + Math.floor((Math.random() - 0.5) * 2), color: '#dbeafe' },
                ];
                const totalPct = trafficSources.reduce((s, t) => s + t.pct, 0);
                trafficSources.forEach(t => t.pct = Math.round(t.pct / totalPct * 100));
                const diff = 100 - trafficSources.reduce((s, t) => s + t.pct, 0);
                trafficSources[0].pct += diff;

                const danmakuEmotions = {
                    positive: Math.floor(55 + (Math.random() - 0.5) * 10),
                    question: Math.floor(23 + (Math.random() - 0.5) * 8),
                    negative: Math.floor(8 + (Math.random() - 0.5) * 6),
                    other: 0,
                };
                danmakuEmotions.other = Math.max(0, 100 - danmakuEmotions.positive - danmakuEmotions.question -
                    danmakuEmotions.negative);

                const danmakuSamples = generateDanmakuSamples(config);

                return {
                    scene,
                    config,
                    online,
                    revenue,
                    interactionRate,
                    peakOnline,
                    totalViewers,
                    avgWatchMin,
                    avgInteraction,
                    totalGMV,
                    totalOrders,
                    refundRate,
                    avgPrice,
                    productData,
                    trafficSources,
                    danmakuEmotions,
                    danmakuSamples,
                };
            }

            function generateDanmakuSamples(config) {
                const allSamples = [];
                for (let i = 0; i < 14; i++)
                    allSamples.push({ text: config.danmakuPositive[Math.floor(Math.random() * config
                            .danmakuPositive.length)],
                        type: 'positive' });
                for (let i = 0; i < 6; i++)
                    allSamples.push({ text: config.danmakuQuestion[Math.floor(Math.random() * config
                            .danmakuQuestion.length)],
                        type: 'question' });
                for (let i = 0; i < 4; i++)
                    allSamples.push({ text: config.danmakuNegative[Math.floor(Math.random() * config
                            .danmakuNegative.length)],
                        type: 'negative' });
                return allSamples.sort(() => Math.random() - 0.5);
            }

            // ==================== DOM引用 ====================
            const metricsCardsEl = document.getElementById('metricsCards');
            const productTableBody = document.getElementById('productTableBody');
            const danmakuStatsEl = document.getElementById('danmakuStats');
            const danmakuSamplesEl = document.getElementById('danmakuSamples');
            const refundRateHint = document.getElementById('refundRateHint');
            const sceneTag = document.getElementById('sceneTag');
            const sceneLabelInTable = document.getElementById('sceneLabelInTable');
            const currentDateEl = document.getElementById('currentDate');

            let trendChart = null;
            let trafficChart = null;

            // ==================== 渲染函数 ====================
            function formatNum(n) {
                if (n >= 10000) return (n / 10000).toFixed(1) + '万';
                return n.toLocaleString();
            }

            function renderMetricsCards() {
                const d = currentData;
                const metrics = [
                    { label: '总观看人数', value: formatNum(d.totalViewers), icon: 'fa-eye',
                    color: 'text-sky-500' },
                    { label: '峰值在线', value: formatNum(d.peakOnline), icon: 'fa-arrow-up',
                    color: 'text-blue-600' },
                    { label: '平均观看时长', value: d.avgWatchMin + '分钟', icon: 'fa-clock',
                    color: 'text-indigo-500' },
                    { label: '平均互动率', value: d.avgInteraction + '%', icon: 'fa-comments',
                    color: 'text-violet-500' },
                    { label: '成交订单', value: d.totalOrders + '单', icon: 'fa-receipt',
                    color: 'text-emerald-500' },
                    { label: 'GMV', value: '¥' + formatNum(d.totalGMV), icon: 'fa-coins',
                    color: 'text-amber-500' },
                    { label: '退单率', value: d.refundRate + '%', icon: 'fa-triangle-exclamation',
                    color: 'text-red-500' },
                    { label: '客单价', value: '¥' + d.avgPrice, icon: 'fa-tag', color: 'text-teal-500' },
                ];
                metricsCardsEl.innerHTML = metrics.map(m => `
                    <div class="metric-card">
                        <p class="text-xs text-gray-400 mb-1">${m.label}</p>
                        <p class="text-xl md:text-2xl font-bold text-gray-800 highlight-num">${m.value}</p>
                        <i class="fa-solid ${m.icon} ${m.color} text-sm mt-1 block"></i>
                    </div>
                `).join('');
                refundRateHint.textContent = d.refundRate + '%';
            }

            function renderTrendChart() {
                const d = currentData;
                const labels = d.online.map((_, i) => {
                    const min = i * 5;
                    return `${Math.floor(min/60)}h${String(min%60).padStart(2,'0')}m`;
                });
                const ctx = document.getElementById('trendChart').getContext('2d');
                if (trendChart) trendChart.destroy();
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            {
                                label: '在线人数',
                                data: d.online,
                                borderColor: '#2563eb',
                                backgroundColor: 'rgba(37,99,235,0.04)',
                                borderWidth: 3,
                                pointRadius: 2,
                                pointHoverRadius: 6,
                                pointBackgroundColor: '#1d4ed8',
                                tension: 0.35,
                                fill: true,
                                yAxisID: 'y',
                            },
                            {
                                label: '成交额 (¥)',
                                data: d.revenue,
                                borderColor: '#f59e0b',
                                backgroundColor: 'rgba(245,158,11,0.03)',
                                borderWidth: 2.5,
                                borderDash: [6, 3],
                                pointRadius: 2,
                                pointHoverRadius: 6,
                                pointBackgroundColor: '#d97706',
                                tension: 0.35,
                                fill: false,
                                yAxisID: 'y1',
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => ctx.datasetIndex === 0 ?
                                        `在线: ${ctx.raw} 人` : `成交额: ¥${ctx.raw.toLocaleString()}`,
                                },
                            },
                            legend: { display: true, position: 'top', labels: { boxWidth: 20,
                                padding: 20, font: { size: 12 } } },
                        },
                        scales: {
                            y: {
                                type: 'linear',
                                position: 'left',
                                title: { display: true, text: '在线人数', color: '#2563eb' },
                                ticks: { callback: v => v + '人', color: '#6b7280' },
                                grid: { color: '#f1f5f9' },
                                min: 0,
                                max: Math.ceil(d.peakOnline / 200) * 200 + 200,
                            },
                            y1: {
                                type: 'linear',
                                position: 'right',
                                title: { display: true, text: '成交额 (¥)', color: '#f59e0b' },
                                ticks: { callback: v => '¥' + (v / 1000).toFixed(0) + 'k',
                                color: '#6b7280' },
                                grid: { display: false },
                                min: 0,
                            },
                            x: { ticks: { maxTicksLimit: 12, color: '#6b7280' },
                            grid: { display: false } },
                        },
                    },
                });
            }

            function renderProductTable() {
                const products = currentData.productData;
                productTableBody.innerHTML = products.map(p => {
                    const convClass = p.conversion < 2.8 ? 'text-red-500 font-semibold' :
                        (p.conversion > 4.5 ? 'text-green-600 font-semibold' : 'text-gray-700');
                    const goodClass = p.goodRate < 88 ? 'tag tag-yellow' : (p.goodRate >= 94 ?
                        'tag tag-green' : '');
                    return `
                        <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                            <td class="py-3 pr-2 font-medium text-gray-700">${p.name}</td>
                            <td class="py-3 px-2 text-center">¥${p.price}</td>
                            <td class="py-3 px-2 text-center font-semibold">${p.sales}</td>
                            <td class="py-3 px-2 text-center">¥${(p.price * p.sales).toLocaleString()}</td>
                            <td class="py-3 px-2 text-center ${convClass}">${p.conversion}%</td>
                            <td class="py-3 pl-2 text-center"><span class="${goodClass}">${p.goodRate}%</span></td>
                        </tr>
                    `;
                }).join('');
                sceneLabelInTable.textContent = '— ' + currentData.config.name;
            }

            function renderTrafficChart() {
                const d = currentData;
                const ctx = document.getElementById('trafficChart').getContext('2d');
                if (trafficChart) trafficChart.destroy();
                trafficChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: d.trafficSources.map(t => t.name),
                        datasets: [{
                            data: d.trafficSources.map(t => t.pct),
                            backgroundColor: d.trafficSources.map(t => t.color),
                            borderWidth: 2,
                            borderColor: '#fff',
                            hoverOffset: 6,
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '60%',
                        plugins: {
                            legend: { display: true, position: 'bottom', labels: { boxWidth: 10,
                                    padding: 8, font: { size: 10 } } },
                            tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw}%` } },
                        },
                    },
                });
            }

            function renderDanmakuStats() {
                const d = currentData.danmakuEmotions;
                danmakuStatsEl.innerHTML = `
                    <div class="flex-1 bg-green-50 rounded-xl p-3">
                        <p class="text-2xl font-bold text-green-600">${d.positive}%</p>
                        <p class="text-xs text-gray-500">😊 正面评价</p>
                    </div>
                    <div class="flex-1 bg-amber-50 rounded-xl p-3">
                        <p class="text-2xl font-bold text-amber-600">${d.question}%</p>
                        <p class="text-xs text-gray-500">❓ 咨询类</p>
                    </div>
                    <div class="flex-1 bg-red-50 rounded-xl p-3">
                        <p class="text-2xl font-bold text-red-500">${d.negative}%</p>
                        <p class="text-xs text-gray-500">😟 负面/质疑</p>
                    </div>
                `;
            }

            function renderDanmakuSamples() {
                const samples = currentData.danmakuSamples;
                danmakuSamplesEl.innerHTML = samples.map(s => {
                    let cls = s.type === 'positive' ? 'danmaku-positive' : (s.type === 'question' ?
                        'danmaku-question' : 'danmaku-negative');
                    return `<span class="danmaku-item ${cls}">${s.text}</span>`;
                }).join('');
            }

            function updateSceneTag() {
                const config = sceneConfigs[currentScene];
                sceneTag.textContent = config.emoji + ' ' + config.name;
                sceneTag.className = 'tag ' + config.tagClass;
            }

            function renderAll() {
                renderMetricsCards();
                renderTrendChart();
                renderProductTable();
                renderTrafficChart();
                renderDanmakuStats();
                renderDanmakuSamples();
                updateSceneTag();
            }

            // ==================== 切换专场 ====================
            function switchScene(scene) {
                if (currentScene === scene) return;
                currentScene = scene;
                currentData = generateData(scene);
                // 更新按钮状态
                document.querySelectorAll('.scene-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.scene === scene);
                });
                renderAll();
            }

            // ==================== 刷新数据 ====================
            function refreshData() {
                currentData = generateData(currentScene);
                renderAll();
            }

            // ==================== 导出CSV ====================
            function exportCSV() {
                const name = document.getElementById('studentName').value.trim();
                const sid = document.getElementById('studentId').value.trim();
                const sclass = document.getElementById('studentClass').value.trim();
                if (!name || !sid) {
                    alert('请先填写学生姓名和学号再导出。');
                    return;
                }
                const d = currentData;
                const now = new Date();
                const timestamp = now.toLocaleString('zh-CN');
                const a1 = document.getElementById('answer1').value.replace(/\n/g, ' | ');
                const a2 = document.getElementById('answer2').value.replace(/\n/g, ' | ');
                const a3 = document.getElementById('answer3').value.replace(/\n/g, ' | ');
                const a4 = document.getElementById('answer4').value.replace(/\n/g, ' | ');
                const a5 = document.getElementById('answer5').value.replace(/\n/g, ' | ');

                const rows = [
                    ['直播数据检测报告', '', ''],
                    ['导出时间', timestamp, ''],
                    ['直播专场', d.config.name, ''],
                    ['', '', ''],
                    ['学生信息', '', ''],
                    ['姓名', name, ''],
                    ['学号', sid, ''],
                    ['班级', sclass, ''],
                    ['', '', ''],
                    ['=== 核心指标 ===', '', ''],
                    ['总观看人数', d.totalViewers, ''],
                    ['峰值在线', d.peakOnline, ''],
                    ['平均观看时长(分钟)', d.avgWatchMin, ''],
                    ['平均互动率(%)', d.avgInteraction, ''],
                    ['成交订单', d.totalOrders, ''],
                    ['GMV(元)', d.totalGMV, ''],
                    ['退单率(%)', d.refundRate, ''],
                    ['客单价(元)', d.avgPrice, ''],
                    ['', '', ''],
                    ['=== 商品销售 ===', '', ''],
                    ['商品名称', '售价', '销量', '转化率(%)', '好评率(%)'],
                    ...d.productData.map(p => [p.name, p.price, p.sales, p.conversion, p.goodRate]),
                    ['', '', ''],
                    ['=== 流量来源 ===', '', ''],
                    ...d.trafficSources.map(t => [t.name, t.pct + '%', '']),
                    ['', '', ''],
                    ['=== 弹幕情绪 ===', '', ''],
                    ['正面评价', d.danmakuEmotions.positive + '%', ''],
                    ['咨询类', d.danmakuEmotions.question + '%', ''],
                    ['负面/质疑', d.danmakuEmotions.negative + '%', ''],
                    ['其他', d.danmakuEmotions.other + '%', ''],
                    ['', '', ''],
                    ['=== 学生诊断 ===', '', ''],
                    ['Q1: 流量趋势分析', a1, ''],
                    ['Q2: 商品转化分析', a2, ''],
                    ['Q3: 退单率分析', a3, ''],
                    ['Q4: 弹幕情绪应对', a4, ''],
                    ['Q5: 优化建议', a5, ''],
                ];

                const csvContent = rows.map(row =>
                    row.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')
                ).join('\n');

                const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `直播诊断报告_${d.config.name}_${name}_${sid}_${now.toISOString().slice(0,10)}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            // ==================== 事件绑定 ====================
            document.getElementById('sceneButtons').addEventListener('click', (e) => {
                const btn = e.target.closest('.scene-btn');
                if (!btn) return;
                switchScene(btn.dataset.scene);
            });

            document.getElementById('refreshDataBtn').addEventListener('click', refreshData);
            document.getElementById('exportBtn').addEventListener('click', exportCSV);
            document.getElementById('clearAnswersBtn').addEventListener('click', () => {
                for (let i = 1; i <= 5; i++) {
                    document.getElementById('answer' + i).value = '';
                }
            });

            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
                    e.preventDefault();
                    exportCSV();
                }
            });

            // ==================== 初始化 ====================
            function init() {
                currentData = generateData(currentScene);
                currentDateEl.textContent = new Date().toLocaleDateString('zh-CN', { year: 'numeric',
                    month: 'long', day: 'numeric' });
                renderAll();
            }
            init();

            console.log('📊 直播数据检测模拟器已就绪');
            console.log('   - 5个专场可选：美妆个护 | 食品饮料 | 服饰鞋包 | 家居日用 | 数码家电');
            console.log('   - 切换专场后商品、弹幕、退单率等数据自动更新');
            console.log('   - 填写诊断后点击"导出诊断报告"下载CSV');
            console.log('   - 或按 Ctrl+E 快速导出');
        })();
    </script>
</body>
</html>
